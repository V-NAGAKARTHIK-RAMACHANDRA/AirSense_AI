<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predict AQI | AirSense AI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/predict.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

    <!-- ========================= -->
    <!-- Navbar -->
    <!-- ========================= -->

    <nav class="navbar">

        <div class="logo">
            🌍 AirSense AI
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="predict.html" class="active">Predict</a></li>

            <li><a href="dashboard.html">Dashboard</a></li>

        </ul>

    </nav>



    <!-- ========================= -->
    <!-- Prediction Section -->
    <!-- ========================= -->

    <section class="prediction-container">

        <!-- ================= LEFT PANEL ================= -->

        <div class="left-panel">

            <div class="glass-card">

                <h1>Predict Air Quality</h1>

                <p>
                    Enter pollution parameters below and let our AI model
                    estimate the Air Quality Index (AQI).
                </p>

                <div id="prediction-form">

                    <!-- PM2.5 -->

                    <label for="pm25">
                        PM2.5
                        <span
id="pm25Value"
class="slider-value">

50

</span>
                    </label>

                    <input
                        type="range"
                        id="pm25"
                        min="0"
                        max="300"
                        value="50">

                    <!-- PM10 -->

                    <label for="pm10">
                        PM10
                        <span id="pm10Value"
                        class="slider-value">
                        80</span>
                    </label>

                    <input
                        type="range"
                        id="pm10"
                        min="0"
                        max="400"
                        value="80">

                    <!-- CO -->

                    <label for="co">
                        CO
                        <span id="coValue"
                        class="slider-value">
                        100</span>
                    </label>

                    <input
                        type="range"
                        id="co"
                        min="0"
                        max="500"
                        value="100">

                    <!-- NO2 -->

                    <label for="no2">
                        NO₂
                        <span id="no2Value"
                        class="slider-value">
                        40</span>
                    </label>

                    <input
                        type="range"
                        id="no2"
                        min="0"
                        max="200"
                        value="40">

                    <!-- SO2 -->

                    <label for="so2">
                        SO₂
                        <span id="so2Value"
                        class="slider-value">
                        20</span>
                    </label>

                    <input
                        type="range"
                        id="so2"
                        min="0"
                        max="200"
                        value="20">

                    <!-- Humidity -->

                    <label for="humidity">
                        Humidity
                        <span id="humidityValue"
                        class="slider-value">
                        60%
                        </span>
                    </label>

                    <input
                        type="range"
                        id="humidity"
                        min="0"
                        max="100"
                        value="60">

                </div>

                <button id="predictBtn">

                    🚀 Predict AQI

                </button>

            </div>

        </div>



        <!-- ================= RIGHT PANEL ================= -->

        <div class="right-panel">

            <div class="result-card">

                <h2>Prediction Result</h2>

                <div class="aqi-number">

                    --

                </div>

                <div class="aqi-status">

                    Waiting for Prediction...

                </div>

                <div class="aqi-meter">

                    <div class="meter-fill"></div>

                </div>

                <div class="health-card">

                    Health recommendation will appear here.

                </div>

            </div>

        </div>

    </section>



    <!-- JavaScript -->

    <script src="assets/js/predict.js"></script>

</body>

</html>
